<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sentiment Analysis – NLP Text Classifier</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #1A3C6E;
    --blue:    #2E6DB4;
    --blue-lt: #EEF3FA;
    --green:   #2E7D52;
    --green-lt:#E6F4ED;
    --red:     #B03A2E;
    --red-lt:  #FDECEA;
    --amber:   #B7620A;
    --amber-lt:#FEF3E2;
    --gray:    #6B7280;
    --border:  #DEE4EE;
    --bg:      #F5F7FA;
    --white:   #FFFFFF;
    --text:    #111827;
    --text2:   #4B5563;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: #fff;
    padding: 28px 40px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-icon {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: 13px; opacity: 0.7; margin-top: 3px; }

  /* ── MAIN LAYOUT ── */
  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--gray);
    margin-bottom: 10px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
  }

  /* ── INPUT AREA ── */
  textarea {
    width: 100%; min-height: 110px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    resize: vertical;
    outline: none;
    transition: border 0.2s;
    background: var(--white);
  }
  textarea:focus { border-color: var(--blue); }
  textarea::placeholder { color: #9CA3AF; }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 20px;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }

  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary { background: var(--blue-lt); color: var(--navy); }
  .btn-secondary:hover { opacity: 0.8; }
  .btn-clear { background: #F3F4F6; color: var(--text2); }

  /* ── EXAMPLES ── */
  .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .ex-chip {
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    background: var(--white);
    color: var(--text2);
    transition: background 0.15s, border-color 0.15s;
  }
  .ex-chip:hover { background: var(--blue-lt); border-color: var(--blue); color: var(--navy); }

  /* ── RESULT BANNER ── */
  #result-banner {
    display: none;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    align-items: center;
    gap: 18px;
  }
  #result-banner.pos { background: var(--green-lt); border: 1.5px solid #A7D7B8; }
  #result-banner.neg { background: var(--red-lt);   border: 1.5px solid #F5B4AE; }
  #result-banner.neu { background: var(--amber-lt); border: 1.5px solid #F9CB8A; }

  .result-emoji { font-size: 42px; line-height: 1; }
  .result-label { font-size: 22px; font-weight: 700; }
  .result-label.pos { color: var(--green); }
  .result-label.neg { color: var(--red); }
  .result-label.neu { color: var(--amber); }
  .result-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* ── CONFIDENCE BAR ── */
  .conf-block { margin-top: 10px; }
  .conf-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .conf-name { font-size: 13px; width: 80px; color: var(--text2); }
  .conf-track {
    flex: 1; height: 8px;
    background: #E5E7EB;
    border-radius: 99px; overflow: hidden;
  }
  .conf-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .fill-pos { background: var(--green); }
  .fill-neg { background: var(--red); }
  .fill-neu { background: var(--amber); }
  .conf-pct { font-size: 13px; font-weight: 600; min-width: 38px; text-align: right; }

  /* ── HOW IT WORKS ── */
  .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
  .step {
    background: var(--blue-lt);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .step-num {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--blue); background: #fff;
    display: inline-block; border-radius: 99px;
    padding: 2px 10px; margin-bottom: 10px;
  }
  .step-title { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 5px; }
  .step-desc  { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* ── HISTORY ── */
  #history-list { display: flex; flex-direction: column; gap: 10px; }
  .hist-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--white);
  }
  .hist-badge {
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 99px; white-space: nowrap; margin-top: 2px;
  }
  .badge-pos { background: var(--green-lt); color: var(--green); }
  .badge-neg { background: var(--red-lt);   color: var(--red);   }
  .badge-neu { background: var(--amber-lt); color: var(--amber); }
  .hist-text { font-size: 13px; color: var(--text2); line-height: 1.5; }

  #history-empty { font-size: 13px; color: var(--gray); font-style: italic; }

  /* ── STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-num.pos { color: var(--green); }
  .stat-num.neg { color: var(--red); }
  .stat-num.neu { color: var(--amber); }
  .stat-num.neu { color: var(--amber); }
  .stat-lbl { font-size: 12px; color: var(--gray); margin-top: 4px; }

  /* ── LOADING ── */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .analyzing { opacity: 0.6; font-style: italic; font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="header-icon">🧠</div>
  <div>
    <h1>Sentiment Analysis – NLP Text Classifier</h1>
    <p>Detects whether text is Positive, Negative, or Neutral using NLP &amp; Machine Learning</p>
  </div>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-lbl">Total Analyzed</div>
    </div>
    <div class="stat-card">
      <div class="stat-num pos" id="stat-pos">0</div>
      <div class="stat-lbl">Positive</div>
    </div>
    <div class="stat-card">
      <div class="stat-num neg" id="stat-neg">0</div>
      <div class="stat-lbl">Negative</div>
    </div>
    <div class="stat-card">
      <div class="stat-num neu" id="stat-neu">0</div>
      <div class="stat-lbl">Neutral</div>
    </div>
  </div>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="section-title">Enter text to analyze</div>
    <textarea id="inputText" placeholder="Type or paste any review, comment, or sentence here…"></textarea>

    <div class="btn-row">
      <button class="btn-primary" onclick="analyze()" id="analyzeBtn">🔍 Analyze Sentiment</button>
      <button class="btn-clear" onclick="clearInput()">Clear</button>
    </div>

    <div style="margin-top:18px;">
      <div class="section-title">Try an example</div>
      <div class="examples" id="examples"></div>
    </div>
  </div>

  <!-- RESULT BANNER -->
  <div id="result-banner">
    <div class="result-emoji" id="result-emoji"></div>
    <div>
      <div class="result-label" id="result-label"></div>
      <div class="result-sub"  id="result-sub"></div>
      <div class="conf-block" id="conf-block"></div>
    </div>
  </div>



  <!-- HISTORY -->
  <div class="card">
    <div class="section-title" style="margin-bottom:14px;">Analysis history</div>
    <div id="history-list">
      <div id="history-empty">No analyses yet — try entering some text above.</div>
    </div>
  </div>

</div>

<script>
const examples = [
  "This product is absolutely amazing and works perfectly!",
  "Terrible quality, broke after one day of use.",
  "It works fine, nothing special about it.",
  "Best purchase I have ever made, highly recommend!",
  "Very disappointed, not worth the money at all.",
  "Average product, meets basic expectations.",
  "Excellent service and fast delivery, very happy!",
  "Stopped working within a week, totally useless.",
];

const history = [];
const stats = { total: 0, pos: 0, neg: 0, neu: 0 };

// Render example chips
const ec = document.getElementById("examples");
examples.forEach(ex => {
  const chip = document.createElement("div");
  chip.className = "ex-chip";
  chip.textContent = ex.length > 45 ? ex.slice(0, 45) + "…" : ex;
  chip.onclick = () => { document.getElementById("inputText").value = ex; analyze(); };
  ec.appendChild(chip);
});

async function analyze() {
  const text = document.getElementById("inputText").value.trim();
  if (!text) { alert("Please enter some text first."); return; }

  const btn = document.getElementById("analyzeBtn");
  btn.innerHTML = '<span class="spinner"></span> Analyzing…';
  btn.disabled = true;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: `You are a sentiment analysis classifier. Analyze the sentiment of the given text and respond ONLY with a valid JSON object — no explanation, no markdown, no extra text.

The JSON must have exactly this structure:
{
  "label": "Positive" or "Negative" or "Neutral",
  "scores": {
    "Positive": <integer 0-100>,
    "Negative": <integer 0-100>,
    "Neutral": <integer 0-100>
  },
  "reason": "<one short sentence explaining why>"
}

Rules:
- The three scores must add up to exactly 100
- label must match the highest scoring category
- reason must be one sentence, plain English`,
        messages: [{ role: "user", content: `Analyze the sentiment of this text: "${text}"` }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || "").join("").trim();
    const clean = raw.replace(/```json|```/g, "").trim();
    const result = JSON.parse(clean);

    showResult(result.label, result.scores, result.reason, text);

  } catch (err) {
    alert("Analysis failed. Please try again.\n" + err.message);
  }

  btn.innerHTML = "🔍 Analyze Sentiment";
  btn.disabled = false;
}

function showResult(label, scores, reason, text) {
    const banner = document.getElementById("result-banner");
    banner.style.display = "flex";
    banner.className = "";

    const emojiMap = { Positive: "😊", Negative: "😞", Neutral: "😐" };
    const classMap = { Positive: "pos", Negative: "neg", Neutral: "neu" };

    const cls = classMap[label];
    banner.classList.add(cls);
    document.getElementById("result-emoji").textContent = emojiMap[label];

    const lbl = document.getElementById("result-label");
    lbl.textContent = label;
    lbl.className = "result-label " + cls;
    document.getElementById("result-sub").textContent = reason;

    const fillCls = { Positive: "fill-pos", Negative: "fill-neg", Neutral: "fill-neu" };
    let barsHTML = "";
    ["Positive","Negative","Neutral"].forEach(s => {
      barsHTML += `
        <div class="conf-row">
          <span class="conf-name">${s}</span>
          <div class="conf-track"><div class="conf-fill ${fillCls[s]}" id="bar-${s}" style="width:0%"></div></div>
          <span class="conf-pct">${scores[s]}%</span>
        </div>`;
    });
    document.getElementById("conf-block").innerHTML = barsHTML;
    setTimeout(() => {
      ["Positive","Negative","Neutral"].forEach(s => {
        const el = document.getElementById("bar-" + s);
        if (el) el.style.width = scores[s] + "%";
      });
    }, 50);

    stats.total++;
    if (cls === "pos") stats.pos++;
    else if (cls === "neg") stats.neg++;
    else stats.neu++;
    document.getElementById("stat-total").textContent = stats.total;
    document.getElementById("stat-pos").textContent   = stats.pos;
    document.getElementById("stat-neg").textContent   = stats.neg;
    document.getElementById("stat-neu").textContent   = stats.neu;

    history.unshift({ text, label, cls });
    renderHistory();
}

function renderHistory() {
  const list = document.getElementById("history-list");
  document.getElementById("history-empty").style.display = "none";
  list.innerHTML = "";
  history.slice(0, 8).forEach(h => {
    const div = document.createElement("div");
    div.className = "hist-item";
    div.innerHTML = `
      <span class="hist-badge badge-${h.cls}">${h.label}</span>
      <span class="hist-text">${h.text.length > 120 ? h.text.slice(0,120)+"…" : h.text}</span>`;
    list.appendChild(div);
  });
}

function clearInput() {
  document.getElementById("inputText").value = "";
  document.getElementById("result-banner").style.display = "none";
}

// Allow Enter+Ctrl to analyze
document.getElementById("inputText").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.ctrlKey) analyze();
});
</script>
</body>
</html>
